name: Build Android App

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK with Buildozer
    runs-on: ubuntu-22.04

    steps:
      # 1. Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instalar dependencias del sistema (Android SDK/NDK lo necesita)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache

      # 4. Instalar buildozer y cython
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      # 5. Cache del SDK/NDK de Android (ahorra ~30 min en compilaciones futuras)
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # 6. Cache local de buildozer
      - name: Cache local .buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-local-${{ runner.os }}-

      # 7. Compilar el APK en modo debug
      - name: Build APK
        run: |
          # Aceptar todas las licencias de Android SDK de antemano
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_SDK_ROOT/tools/bin/sdkmanager --licenses || true
          # Ejecutar buildozer directamente para registrar todos los logs en Actions
          buildozer -v android debug
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      # 8. Subir el APK como artifact descargable
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: InDrive-Finanzas-APK
          path: bin/*.apk
          retention-days: 30
